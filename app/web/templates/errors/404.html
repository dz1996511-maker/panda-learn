{% extends "base.html" %}
{% block title %}页面未找到{% endblock %}
{% block page_title %}🌫 404{% endblock %}
{% block content %}

<div class="chat-bubble" style="text-align:center;padding:48px 32px;">
    <canvas id="panda-404" width="64" height="64" style="image-rendering:pixelated;margin-bottom:16px;"></canvas>
    <h2 style="color:#e0e0e0;margin-bottom:8px;">页面走丢了</h2>
    <p style="color:#888;margin-bottom:20px;">熊猫找了一圈也没找到这个页面</p>
    <a href="/" class="btn btn-primary">← 回首页</a>
</div>

<script>
// 在 404 页渲染一个像素熊猫
(function() {
    var c = document.getElementById('panda-404');
    if (!c) return;
    var ctx = c.getContext('2d');
    var p = [
        '....BBBBBB....',
        '..BBBBBBBBBB..',
        '.BBBBEEBBEBBB.',
        '.BBWWWWWWWWBB.',
        '.BBWWWWWWWWBB.',
        'BBBBWWWWWWBBBB',
        'BBBBWWDDWWBBBB',
        'BBBBWDDWDWBBBB',
        'BBBBWWWWWWBBBB',
        'BBBNNPPNNNBBBB',
        'BBBBWWWWWWBBBB',
        '.BBBBWWWWBBBB.',
        '..BBBBBBBBBB..',
        '...BBBBBBBB...',
        '..BB....BB....',
        '..BBBBBBBB....',
    ];
    var colors = {'.':null,'B':'#1a1a1a','W':'#fff','E':'#444','P':'#ffb0b0','D':'#000','N':'#222'};
    for (var y = 0; y < 16; y++) {
        for (var x = 0; x < 16; x++) {
            var ch = p[y][x];
            var col = colors[ch];
            if (col) { ctx.fillStyle = col; ctx.fillRect(x*4, y*4, 4, 4); }
        }
    }
})();
</script>
{% endblock %}
